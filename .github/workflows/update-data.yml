name: Update Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 10 * * *"   # 10:15 AM UTC daily

permissions:
  contents: write

concurrency:
  group: dashboard-data-sync
  cancel-in-progress: false

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-sync.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements-sync.txt

      - name: Sync published CSV tabs into dashboard data
        run: python scripts/sync_google_sheets.py

      - name: Rebuild Bayesian artifacts
        run: python update_bayes.py js/data.js

      - name: Show generated diff
        run: git diff --stat js/data.js || true

      - name: Commit and push if data changed
        run: |
          if git diff --quiet js/data.js; then
            echo "No dashboard data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/data.js
          git commit -m "chore: sync dashboard data [$(date -u +%Y-%m-%d)]"
          git push
