name: Update Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 10 * * *"

permissions:
  contents: write

concurrency:
  group: dashboard-data-sync
  cancel-in-progress: false

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-sync.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements-sync.txt

      - name: Validate required secrets
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$GOOGLE_SHEET_ID" || { echo "Missing GOOGLE_SHEET_ID secret"; exit 1; }
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON" || { echo "Missing GOOGLE_SERVICE_ACCOUNT_JSON secret"; exit 1; }

      - name: Sync Google Sheets into dashboard data
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_MACROS_TAB: ${{ vars.GOOGLE_SHEET_MACROS_TAB }}
          GOOGLE_SHEET_SLEEP_TAB: ${{ vars.GOOGLE_SHEET_SLEEP_TAB }}
          GOOGLE_SHEET_STEPS_TAB: ${{ vars.GOOGLE_SHEET_STEPS_TAB }}
        run: python scripts/sync_google_sheets.py

      - name: Rebuild Bayesian artifacts
        run: python update_bayes.py

      - name: Show generated diff
        run: git status --short

      - name: Commit and push if data changed
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/data.js
          git commit -m "Sync dashboard data from Google Sheets"
          git push
