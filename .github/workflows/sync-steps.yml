name: Sync Apple Health Steps

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Single day to sync (YYYY-MM-DD)"
        required: false
        type: string
      steps:
        description: "Single day step count"
        required: false
        type: string
      payload_json:
        description: "Optional JSON payload for backfills; array/object of {date,steps}"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: dashboard-apple-steps-sync
  cancel-in-progress: false

jobs:
  sync-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-sync.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements-sync.txt

      - name: Merge Apple Health steps into dashboard data
        run: python scripts/sync_steps.py
        env:
          APPLE_STEPS_DATE: ${{ inputs.date }}
          APPLE_STEPS_VALUE: ${{ inputs.steps }}
          APPLE_STEPS_PAYLOAD_JSON: ${{ inputs.payload_json }}

      - name: Rebuild Bayesian artifacts
        run: python update_bayes.py js/data.js

      - name: Validate generated dashboard artifacts
        run: python scripts/validate_dashboard_build.py

      - name: Show generated diff
        run: git diff --stat js/data.js || true

      - name: Commit and push if data changed
        run: |
          if git diff --quiet js/data.js; then
            echo "No dashboard data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/data.js
          git commit -m "chore: sync apple health steps [$(date -u +%Y-%m-%d)]"
          git push
